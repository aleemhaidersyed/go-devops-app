# ──────────────────────────────────────────────────────────────────
# CI Workflow — Continuous Integration
# Runs on: every push to main, every pull request targeting main
# Purpose: lint, test, security scan, build verification
# ──────────────────────────────────────────────────────────────────
name: CI

# ── Triggers ───────────────────────────────────────────────────────
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# ── Environment Variables ──────────────────────────────────────────
# Available to all jobs in this workflow
env:
  GO_VERSION: '1.23'
  APP_NAME: go-devops-app

# ── Jobs ───────────────────────────────────────────────────────────
jobs:

  # ════════════════════════════════════════════════════════════════
  # JOB 1: lint
  # Checks code quality and style
  # ════════════════════════════════════════════════════════════════
  lint:
    name: Lint
    runs-on: ubuntu-latest   # GitHub provides this Ubuntu VM for free

    steps:
      # Step 1: Download your repo code onto the runner VM
      # Without this, the runner has NO idea what your code is
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install the exact Go version we need
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true   # Cache Go modules between runs = faster builds

      # Step 3: Run golangci-lint
      # Uses the official golangci-lint GitHub Action
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.59.1
          args: --timeout=5m

  # ════════════════════════════════════════════════════════════════
  # JOB 2: test
  # Runs all unit tests and generates a coverage report
  # ════════════════════════════════════════════════════════════════
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      # Download dependencies first (separate step = better caching)
      - name: Download dependencies
        run: go mod download

      # Run tests with race detector and coverage
      # -race    = detects race conditions (concurrent access bugs)
      # -cover   = measures what % of code is covered by tests
      # -count=1 = disable test result caching (always run fresh)
      - name: Run tests
        run: go test -race -cover -count=1 ./...

      # Generate detailed coverage report
      - name: Generate coverage report
        run: |
          go test -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out

      # Save the coverage file so you can download it from GitHub UI
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7   # Auto-delete after 7 days

  # ════════════════════════════════════════════════════════════════
  # JOB 3: security-scan
  # Scans Docker image for known vulnerabilities (CVEs)
  # ════════════════════════════════════════════════════════════════
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    # Only run after lint and test pass — no point scanning broken code
    needs: [lint, test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      # Build the Docker image so Trivy can scan it
      - name: Build Docker image for scanning
        run: docker build -t ${{ env.APP_NAME }}:scan .

      # Trivy = industry-standard open-source security scanner by Aqua Security
      # It checks your image layers against databases of known vulnerabilities (CVEs)
      # EXIT-CODE 1 = fail the pipeline if CRITICAL vulnerabilities are found
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.APP_NAME }}:scan
          format: table          # Human-readable table output
          exit-code: '1'         # Fail if vulnerabilities found
          ignore-unfixed: true   # Ignore vulns with no fix available yet
          severity: CRITICAL     # Only fail on CRITICAL severity

  # ════════════════════════════════════════════════════════════════
  # JOB 4: build-verify
  # Verifies the Go binary compiles successfully
  # ════════════════════════════════════════════════════════════════
  build-verify:
    name: Build Verify
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      # Build the binary — if this fails, something is very wrong
      - name: Build binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
          go build -ldflags="-w -s" -o ./server ./cmd/server/

      # Verify the binary actually exists and is executable
      - name: Verify binary exists
        run: |
          ls -lh ./server
          file ./server
