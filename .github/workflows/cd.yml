# ──────────────────────────────────────────────────────────────────
# CD Workflow — Continuous Delivery
# Runs on: push to main ONLY (i.e. after a PR is merged)
# Purpose: build final Docker image, push to Docker Hub
# ──────────────────────────────────────────────────────────────────
name: CD

on:
  push:
    branches: [ main ]

env:
  GO_VERSION: '1.23'
  APP_NAME: go-devops-app
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:

  # ════════════════════════════════════════════════════════════════
  # JOB: build-and-push
  # Builds the Docker image and pushes to Docker Hub
  # ════════════════════════════════════════════════════════════════
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Extract metadata for Docker tags and labels
      # This generates smart tags like:
      #   - latest (for main branch)
      #   - sha-abc1234 (git commit short SHA)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      # Set up Docker Buildx — advanced builder with caching support
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to Docker Hub using our GitHub Secrets
      # ${{ secrets.DOCKERHUB_USERNAME }} reads the secret we set up earlier
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build and push in one step
      # --cache-from = reuse cached layers from previous runs (faster builds)
      # --cache-to   = save new layers to cache for future runs
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha        # Use GitHub Actions cache
          cache-to: type=gha,mode=max # Save to GitHub Actions cache

      # Print a summary of what was built
      - name: Print image digest
        run: |
          echo "✅ Image pushed successfully!"
          echo "Tags: ${{ steps.meta.outputs.tags }}"
          echo "Image digest: ${{ steps.meta.outputs.digest }}"
