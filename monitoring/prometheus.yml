global:
  scrape_interval: 15s      # Collect metrics every 15 seconds
  evaluation_interval: 15s  # Evaluate alert rules every 15 seconds

scrape_configs:
  # Prometheus scrapes itself (so you can monitor Prometheus!)
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Scrape our Go app's /metrics endpoint
  # 'app' is the Docker Compose service name — Docker DNS resolves it
  - job_name: 'go-devops-app'
    static_configs:
      - targets: ['app:8080']
    metrics_path: '/metrics'
